services:
  - type: web
    name: bankable-property-os-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: BANKABLE_CORS_ORIGINS
        value: https://scanovich.ai,https://www.scanovich.ai
      - key: QDRANT_URL
        sync: false
      - key: LOCAL_AI_EMBEDDING_BASE_URL
        sync: false
      - key: LOCAL_AI_RERANKER_BASE_URL
        sync: false
