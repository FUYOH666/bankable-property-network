# ASEAN Property Settlement — Policy Pack v1
# pack_id: asean-property-settlement-v1
# jurisdiction focus: TH, SG, MY (ASEAN property corridor)
# Synthetic demo only — not legal advice.
#
# Scenarios (demo):
#   deal 0xABCD — Siam Riverside Living happy path
#   deal 0xDEAD — SRL Holding 2026 impostor payee (reject via feed, not DSL)

rules:
  - id: payee-must-match-developer-feed
    require: payee_verified == true

  - id: capital-not-red
    require: capital_class < 2

  - id: asean-jurisdictions-only
    require: jurisdiction == "TH" or jurisdiction == "SG" or jurisdiction == "MY"

  - id: institutional-threshold-sg-my
    require: jurisdiction == "TH" or amount_usdc <= 500000000000 or buyer_kyc_tier >= 3
