# Default AttestRWA compliance policy.
#
# Banks publish their own policy packs as YAML; this one is the baseline used
# by the demo attester. Each rule's `require` expression is evaluated against
# the decision context:
#
#   payee_verified   : bool  — payee wallet matches developer authorized set
#   capital_class    : int   — 0=green, 1=amber, 2=red (from wallet_taint)
#   amount_usdc      : int   — settlement amount in USDC base units (6 decimals)
#   buyer_kyc_tier   : int   — 0 unknown, 1 basic, 2 enhanced, 3 institutional
#   jurisdiction     : str   — ISO 3166-1 alpha-2 code
#
# The DSL allows AND / OR / NOT, comparison operators, numeric / boolean /
# string literals, and references to context names. No function calls.

rules:
  - id: payee-must-match-developer-feed
    require: payee_verified == true
  - id: capital-not-red
    require: capital_class < 2
  - id: kyc-tier-by-amount
    require: amount_usdc <= 100000000000 or buyer_kyc_tier >= 3
  - id: only-supported-jurisdictions
    require: jurisdiction == "TH" or jurisdiction == "SG" or jurisdiction == "AE" or jurisdiction == "VN" or jurisdiction == "ID"
