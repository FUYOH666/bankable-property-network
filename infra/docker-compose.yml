services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  bankable-api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BANKABLE_LOG_LEVEL: INFO
      BANKABLE_AI_TIER: demo_local
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: bankable_property_network
      LOCAL_AI_EMBEDDING_BASE_URL: http://host.docker.internal:9001
      LOCAL_AI_RERANKER_BASE_URL: http://host.docker.internal:9002
      LOCAL_AI_LLM_INSTRUCT_BASE_URL: http://host.docker.internal:1234/v1
      LOCAL_AI_LLM_INSTRUCT_MODEL: local-model
      LOCAL_AI_LLM_ENABLE_THINKING: "false"
      CONSULT_RETRIEVAL_MODE: auto
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  whatsapp-bridge:
    build:
      context: ../services/whatsapp-bridge
      dockerfile: Dockerfile
    ports:
      - "8020:8020"
    environment:
      BANKABLE_API_URL: http://bankable-api:8080
      WHATSAPP_SESSION_PATH: /data/session/whatsapp.db
      ALLOWED_CHAT_JID: ""
    volumes:
      - whatsapp_session:/data/session
    depends_on:
      bankable-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8020/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  qdrant_storage:
  whatsapp_session:
