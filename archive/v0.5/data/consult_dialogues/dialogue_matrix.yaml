# Multi-turn consult dialogue scripts for simulation (synthetic demo).
dialogues:
  - id: villa_buyer_en
    description: WhatsApp replay — villa request then inventory/location follow-up
    channel: whatsapp
    turns:
      - user: "привет"
        expect:
          intent: greeting
          reply_contains: ["Landmark"]
          reply_not_contains: ["project-riverside", "Dubai", "Karon", '"id":']
      - user: "i want buy villa"
        expect:
          intent: project_faq
          reply_contains_any: ["Landmark", "Bangkok", "Sukhumvit", "condominium", "condo"]
          reply_not_contains: ["project-riverside", "Dubai", "Karon", '"id":', "budget range"]
      - user: "what do you have and where?"
        expect:
          intent: project_faq
          citations_any: ["FAQ.md", "Project_Overview.md", "consult_kb"]
          reply_contains_any: ["Landmark", "Bangkok", "Sukhumvit", "18", "2BR", "3BR"]
          reply_not_contains: ["project-riverside", "Dubai", "UAE", "Karon", '"id":']
          max_reply_length: 1200

  - id: project_faq_ru
    description: Russian project FAQ — price, FET, installment
    channel: web
    turns:
      - user: "сколько стоит квартира?"
        expect:
          intent: project_faq
          reply_contains_any: ["Landmark", "Bangkok", "18", "млн", "THB"]
          reply_not_contains: ['"id":']
      - user: "что такое FET?"
        expect:
          intent: project_faq
          reply_contains_any: ["FET", "Foreign Exchange", "foreign exchange"]
          reply_not_contains: ["project-riverside"]
      - user: "есть рассрочка?"
        expect:
          intent: project_faq
          reply_not_contains: ['"id":']

  - id: settlement_en
    description: Settlement — payee mismatch, no deposit approval
    channel: web
    turns:
      - user: "What is the payee mismatch on escrow?"
        expect:
          intent: settlement
          tools_contains: developer_hub_snapshot
          reply_not_contains: ['"id":']
      - user: "Can I deposit cash today?"
        expect:
          intent: settlement
          reply_contains_any: ["deposit", "do not", "не переводите", "reject", "escrow", "bankable"]
          reply_not_contains: ["approve your deposit", "go ahead and pay"]

  - id: mixed_ru_en
    description: Language switch — RU greeting then EN price question
    channel: web
    turns:
      - user: "Привет"
        expect:
          intent: greeting
      - user: "What is the price for a 2BR unit?"
        expect:
          intent: project_faq
          reply_contains_any: ["Landmark", "18", "Bangkok", "Sukhumvit"]
          reply_not_contains: ["project-riverside"]

  - id: follow_up_context
    description: Session follow-up — unit types after price question
    channel: web
    turns:
      - user: "How much does a 2BR cost?"
        expect:
          intent: project_faq
      - user: "what unit types do you have?"
        expect:
          intent: project_faq
          reply_contains_any: ["2BR", "3BR", "Landmark", "Bangkok", "Sukhumvit"]
          reply_not_contains: ["project-riverside", '"id":']

  - id: mixed_project_settlement
    description: Project price question then settlement deposit — bridge KB + bank tools
    channel: web
    turns:
      - user: "How much is a 2BR at Landmark Sukhumvit Tower?"
        expect:
          intent: project_faq
          reply_contains_any: ["Landmark", "Bangkok", "Sukhumvit", "18", "2BR"]
      - user: "Can I wire the deposit to the agent account?"
        expect:
          intent: settlement
          tools_contains: developer_hub_snapshot
          reply_contains_any: ["escrow", "payee", "do not", "не переводите", "unverified"]
          reply_not_contains: ["approve your deposit", "go ahead"]

  - id: usdt_buyer_ru
    description: USDT purchase pitch — no prompt leak
    channel: whatsapp
    turns:
      - user: "а как покупать? у меня usdt"
        expect:
          intent: mixed
          tools_contains: scenario_hint:usdt-mixed-route
          reply_contains_any: ["USDT", "usdt", "янтар", "amber", "conditional", "эскроу", "escrow", "FET", "Landmark"]
          reply_not_contains: ["cite bank api", "Settlement/money questions", "Project sales questions"]

  - id: cash_buyer_ru
    description: Cash buyer — red route, no deposit encouragement
    channel: whatsapp
    turns:
      - user: "хочу купить за наличные"
        expect:
          intent: mixed
          tools_contains: scenario_hint:cash-red-route
          reply_contains_any: ["налич", "cash", "red", "красн", "reject", "отклон", "do not", "не переводите", "P2P"]
          reply_not_contains: ["approve your deposit", "go ahead and pay", "cite bank api"]

  - id: mixed_capital_en
    description: Mixed SWIFT + USDT — conditional route
    channel: web
    turns:
      - user: "I have SWIFT and USDT mixed"
        expect:
          intent: mixed
          tools_contains: scenario_hint:mixed-capital-route
          reply_contains_any: ["mixed", "conditional", "USDT", "SWIFT", "capital", "escrow", "partial"]
          reply_not_contains: ["cite bank api", "Settlement/money questions"]
